name: Build firefox on Windows
env:
  GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
  SCCACHE_DIR: 'C:\Users\runneradmin\AppData\Local\Mozilla\sccache'
  SCCACHE_CACHE_SIZE: "2G"
  SCCACHE_IDLE_TIMEOUT: "0" 
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_firefox:
    runs-on: windows-2019
    steps:
    - name: Checkout Phase I
      uses: actions/checkout@v4
      with:
        repository: mozilla-firefox/firefox
        persist-credentials: false
        ref: ${{ github.head_ref }}
        fetch-depth: 1
        sparse-checkout: |
          /python/mozboot/bin/bootstrap.py
          /browser/config
        
    - name: Cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.mozbuild
          ~/.rustup
          ~/.cargo
          ~\AppData\Local\Mozilla\sccache
          D:\mozilla-source\mozilla-unified\.git
        key: |
          ${{ runner.os }}-firefox-${{ hashFiles('**/mozconfig', '**/bootstrap.py') }}
          ${{ runner.os }}-sccache-${{ github.sha }}
        restore-keys: |
            ${{ runner.os }}-mozbuild
            ${{ runner.os }}-sccache-

    - name: Checkout Phase II
      run: |
        git reset --hard HEAD
        git gc --prune=now --aggressive
        git pull
        rustup update stable
        cargo check

    - name: Link checkout
      run: |
        cd ../../../..
        mkdir mozilla-source
        mklink /J "D:\mozilla-source\mozilla-unified" "D:\a\runner-vm\runner-vm"
        mklink /J "D:\mozilla-source\firefox" "D:\a\runner-vm\runner-vm"
      shell: cmd

    - name: Setup MozillaBuild
      run: |
        choco install mozillabuild -y --no-progress --limit-output
        cmd /c C:\mozilla-build\start-shell.bat
      shell: cmd

    - name: Enable remote desktop for debug
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Enable-NetFirewallRule -DisplayName 'Remote Desktop - User Mode (TCP-in)'
        netsh advfirewall firewall set rule group="Remote Desktop" new enable=yes
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1

    - name: Display remote desktop connection
      run: |
        FULL_SHA="${{ github.sha }}"
        SHORT_SHA="${FULL_SHA:0:7}"
        P2X="${SHORT_SHA}A1!"
        net user runneradmin "$P2X"
        ssh -p 443 -L4300:localhost:4300 -R0:127.0.0.1:3389 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 tcp@ap.free.pinggy.io &
        sleep 10
        echo "=========================================="
        echo "REMOTE URL:"
        curl -s http://localhost:4300/urls | jq -r '.urls[0]'
        echo "USER: runneradmin"
        echo "PASS: $P2X"
        echo "=========================================="
      shell: bash
      
    - name: Add mercurial to PATH
      run: |
        /c/mozilla-build/python3/python3.exe -m pip uninstall mercurial -y
        /c/mozilla-build/python3/python3.exe -m pip install mercurial --no-cache-dir --force-reinstall
      shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'

#    - name: Pause Build
#      run: |
#        $PauseBuild = $true;
#        if($PauseBuild){
#        $path = "$($env:USERPROFILE)\Desktop\Delete me to continue build.txt"
#        # create "lock" file.
#        Set-Content -Path $path -Value ''    
#        Write-Warning "Build paused. To resume it, open a RDP session, delete 'Delete me to continue build.txt' file on Desktop."
#        # wait until "lock" file is deleted by user.
#        while(Test-Path $path) {
#          Start-Sleep -Seconds 1
#        }
#        Write-Host "Build lock file has been deleted. Resuming build."}
#      shell: powershell

    - name: Test mach command
      run: |
        C:\mozilla-build\start-shell.bat "cd /d/mozilla-source/mozilla-unified && ls -alh && hg version && ./mach settings"
      shell: cmd

    - name: Define build config
      run: |
        cat <<EOF > /d/mozilla-source/mozilla-unified/.mozconfig
        ac_add_options --target=x86_64-pc-mingw32
        ac_add_options --with-ccache=sccache
        ac_add_options --enable-artifact-builds
        ac_add_options --enable-release
        ac_add_options --enable-optimize
        ac_add_options --disable-debug-symbols
        ac_add_options --disable-tests
        ac_add_options --disable-debug
        mk_add_options MOZ_OBJDIR=@TOPSRCDIR@/obj-firefox-windows
        EOF
      shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
      
    - name: Build
      run: |
        C:\mozilla-build\start-shell.bat "cd /d/mozilla-source/mozilla-unified && ./mach clobber && ./mach build && ./mach package"
      shell: cmd
      
    - name: List files
      run: |
        C:\mozilla-build\start-shell.bat "cd /d/mozilla-source/mozilla-unified && ls -alh"
      shell: cmd
