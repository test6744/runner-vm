name: Build firefox on Windows
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_firefox:
    env:
      GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
    runs-on: windows-2019
    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        persist-credentials: false
        ref: ${{ github.head_ref }}
        
    - name: Setup-msbuild
      uses: microsoft/setup-msbuild@v2
      with:
        msbuild-architecture: x64
        
    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1.13.0
      with:
        arch: amd64

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
        token: ${{ env.GH_TOKEN }}

    - name: Setup Node.js environment
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        check-latest: true
        token: ${{ env.GH_TOKEN }}
        
    - name: Cache
      uses: actions/cache@v5
      with:
        path: |
          ~/.mozbuild
          ~/.rustup
          ~/.cargo
          C:\mozilla-source\mozilla-unified\.git
        key: ${{ runner.os }}-firefox-${{ hashFiles('**/mozconfig', '**/bootstrap.py') }}
        restore-keys: |
            ${{ runner.os }}-mozbuild

    - name: Setup MozillaBuild
      run: |
        choco install mozillabuild -y
        call C:\mozilla-build\start-shell.bat
        /c/mozilla-build/python3/python3.exe -m pip install --user mercurial
        hg version
      shell: cmd

    - name: Enable remote desktop for debug
      run: |
        $shortSha = "${{ github.sha }}".Substring(0, 7)
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Enable-NetFirewallRule -DisplayName 'Remote Desktop - User Mode (TCP-in)'
        netsh advfirewall firewall set rule group="Remote Desktop" new enable=yes
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        net user runneradmin "${shortSha}A1!"

    - name: Add mercurial to PATH
      run: |
        echo 'export PATH="'"$(/c/mozilla-build/python3/python3 -m site --user-base)"'/bin:$PATH"' >> ~/.bashrc
      shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'

    - name: Modify config file
      run: |
        ssh -p 443 -R0:127.0.0.1:3389 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 tcp@ap.free.pinggy.io &
      shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'

    - name: Start bootstrapper
      run: |
        cd /d
        mkdir mozilla-source
        cd mozilla-source
        aria2c --remote-time=true https://raw.githubusercontent.com/mozilla-firefox/firefox/refs/heads/main/python/mozboot/bin/bootstrap.py --out bootstrap.py
        /c/mozilla-build/python3/python3.exe -m pip uninstall -y mercurial
        /c/mozilla-build/python3/python3.exe -m pip install mercurial --no-cache-dir --force-reinstall
        hg version
        /c/mozilla-build/python3/python3.exe /d/mozilla-source/bootstrap.py --no-interactive --application-choice=browser
        ls -alh
        mv firefox mozilla-unified
        cd mozilla-unified
        ./mach help
      shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'

    - name: Define build config
      run: |
        cd /d/mozilla-source/mozilla-unified
        cat <<EOF > .mozconfig
        ac_add_options --target=x86_64-pc-mingw32
        ac_add_options --enable-release
        ac_add_options --enable-optimize
        ac_add_options --disable-debug-symbols
        mk_add_options MOZ_OBJDIR=@TOPSRCDIR@/obj-firefox-windows
        EOF
      shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
      
    - name: Build
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force
        cd d:\mozilla-source\mozilla-unified
        ./mach clobber
        ./mach build
      shell: powershell
      
    - name: List files
      run: |
        cd /d/mozilla-source/mozilla-unified
        ls -alh
      shell: 'C:\mozilla-build\msys2\usr\bin\bash.exe --noprofile --norc -e -o pipefail {0}'
